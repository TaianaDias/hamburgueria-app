<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#111827">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BurgerOps">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<title>Analise de Compras | Hamburgueria</title>
</head>
<body>
<main class="page">
  <header class="page-header">
    <div>
      <p class="eyebrow">Financeiro</p>
      <h1>Analise de compras</h1>
      <p id="user-info" class="muted"></p>
    </div>

    <div class="actions">
      <a class="button secondary" href="index.html">Voltar</a>
      <a class="button secondary" href="compras.html">Compras</a>
      <a class="button secondary" href="dashboard-compras.html">Dashboard</a>
      <button id="logout-button" class="secondary" type="button">Sair</button>
    </div>
  </header>

  <section class="stats-grid">
    <article class="card">
      <span class="muted">Total pago em compras</span>
      <strong id="metric-total-paid" class="metric-value">R$ 0,00</strong>
    </article>

    <article class="card">
      <span class="muted">Desconto acumulado</span>
      <strong id="metric-total-discount" class="metric-value">R$ 0,00</strong>
    </article>

    <article class="card">
      <span class="muted">Mes com maior gasto</span>
      <strong id="metric-highest-month" class="metric-value">-</strong>
      <p id="metric-highest-value" class="muted" style="margin-top: 8px;">R$ 0,00</p>
    </article>

    <article class="card">
      <span class="muted">Mes com menor gasto</span>
      <strong id="metric-lowest-month" class="metric-value">-</strong>
      <p id="metric-lowest-value" class="muted" style="margin-top: 8px;">R$ 0,00</p>
    </article>

    <article class="card">
      <span class="muted">Media mensal</span>
      <strong id="metric-average-month" class="metric-value">R$ 0,00</strong>
    </article>
  </section>

  <section class="panel" style="margin-top: 20px;">
    <div class="page-header" style="margin-bottom: 12px;">
      <div>
        <h3>Resumo por mes</h3>
        <p class="muted">Veja quanto saiu em compras e quanto foi economizado em desconto em cada periodo.</p>
      </div>
    </div>

    <div id="monthly-analysis-list" class="list analytics-month-list"></div>
  </section>
</main>

<script type="module">
import { db } from "./firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import {
  aggregateMonthlyPurchases,
  bindLogoutButton,
  describeProfile,
  escapeHtml,
  formatCurrency,
  formatMonthLabel,
  requireAuth
} from "./app.js";

bindLogoutButton();

const { profile } = await requireAuth();
document.getElementById("user-info").textContent = describeProfile(profile);

const purchasesSnapshot = await getDocs(collection(db, "comprasMensais"));
const purchases = purchasesSnapshot.docs.map((document) => ({ id: document.id, ...document.data() }));
const {
  monthlySummaries,
  totalPaid,
  totalDiscount,
  averagePaid,
  highestMonth,
  lowestMonth,
  maxPaid
} = aggregateMonthlyPurchases(purchases);

document.getElementById("metric-total-paid").textContent = formatCurrency(totalPaid);
document.getElementById("metric-total-discount").textContent = formatCurrency(totalDiscount);
document.getElementById("metric-average-month").textContent = formatCurrency(averagePaid);
document.getElementById("metric-highest-month").textContent = highestMonth ? formatMonthLabel(highestMonth.monthKey) : "-";
document.getElementById("metric-highest-value").textContent = highestMonth ? formatCurrency(highestMonth.totalPaid) : "R$ 0,00";
document.getElementById("metric-lowest-month").textContent = lowestMonth ? formatMonthLabel(lowestMonth.monthKey) : "-";
document.getElementById("metric-lowest-value").textContent = lowestMonth ? formatCurrency(lowestMonth.totalPaid) : "R$ 0,00";

const monthlyAnalysisList = document.getElementById("monthly-analysis-list");

if (!monthlySummaries.length) {
  monthlyAnalysisList.innerHTML = '<div class="empty-state">Ainda nao ha compras registradas para analisar.</div>';
} else {
  monthlySummaries
    .slice()
    .sort((left, right) => right.monthKey.localeCompare(left.monthKey))
    .forEach((month) => {
      const article = document.createElement("article");
      article.className = "card analytics-month-card";

      if (highestMonth && month.monthKey === highestMonth.monthKey) {
        article.classList.add("analytics-month-card-high");
      }

      if (lowestMonth && month.monthKey === lowestMonth.monthKey) {
        article.classList.add("analytics-month-card-low");
      }

      const barWidth = maxPaid > 0 ? `${Math.max(8, (month.totalPaid / maxPaid) * 100)}%` : "8%";
      const economyRate = month.totalReference > 0 ? (month.totalDiscount / month.totalReference) : 0;
      const badges = [
        highestMonth && month.monthKey === highestMonth.monthKey ? "Maior gasto" : "",
        lowestMonth && month.monthKey === lowestMonth.monthKey ? "Menor gasto" : ""
      ].filter(Boolean).join(" | ");

      article.innerHTML = `
        <div class="summary-line">
          <span>${escapeHtml(formatMonthLabel(month.monthKey))}</span>
          <strong>${formatCurrency(month.totalPaid)}</strong>
        </div>
        <div class="month-bar-track" style="margin-top: 16px;">
          <div class="month-bar-fill" style="width: ${barWidth};"></div>
        </div>
        <div class="analytics-month-meta" style="margin-top: 16px;">
          <div>
            <span class="muted">Desconto no mes</span>
            <strong>${formatCurrency(month.totalDiscount)}</strong>
          </div>
          <div>
            <span class="muted">Compras registradas</span>
            <strong>${month.purchaseCount}</strong>
          </div>
          <div>
            <span class="muted">Produtos comprados</span>
            <strong>${month.uniqueProducts}</strong>
          </div>
          <div>
            <span class="muted">Economia no mes</span>
            <strong>${new Intl.NumberFormat("pt-BR", { style: "percent", minimumFractionDigits: 1, maximumFractionDigits: 1 }).format(economyRate)}</strong>
          </div>
        </div>
        <p class="muted" style="margin-top: 14px;">${escapeHtml(badges || "Mes acompanhado no controle de compras.")}</p>
      `;

      monthlyAnalysisList.appendChild(article);
    });
}
</script>
</body>
</html>
