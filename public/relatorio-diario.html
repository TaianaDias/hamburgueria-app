<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#111827">
<link rel="icon" href="favicon-32.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<script src="premium-shell.js" defer></script>
<title>Relatorio Diario | Hamburgueria</title>
</head>
<body>
<main class="page">
  <header class="page-header">
    <div>
      <p class="eyebrow">Resumo automatico</p>
      <h1>Relatorio diario</h1>
      <p id="user-info" class="muted"></p>
    </div>
    <div class="actions">
      <a class="button secondary" href="index.html">Voltar</a>
      <button id="print-button" class="secondary" type="button">Imprimir/PDF</button>
      <button id="logout-button" class="secondary" type="button">Sair</button>
    </div>
  </header>

  <section class="stats-grid">
    <article class="card"><span class="muted">Saude do estoque</span><strong id="health" class="metric-value">0%</strong></article>
    <article class="card"><span class="muted">Itens criticos</span><strong id="critical" class="metric-value">0</strong></article>
    <article class="card"><span class="muted">Valor em estoque</span><strong id="stock-value" class="metric-value">R$ 0,00</strong></article>
    <article class="card"><span class="muted">Etiquetas hoje</span><strong id="labels" class="metric-value">0</strong></article>
  </section>

  <section class="layout-grid" style="margin-top: 20px;">
    <article class="panel">
      <h3>Resumo da IA</h3>
      <p id="ai-summary" class="operation-note"></p>
    </article>
    <article class="panel">
      <h3>Sugestao de compra</h3>
      <div id="purchase-suggestion" class="list" style="margin-top: 16px;"></div>
    </article>
  </section>

  <section class="panel" style="margin-top: 20px;">
    <h3>Itens que precisam de atencao</h3>
    <div id="critical-list" class="list" style="margin-top: 16px;"></div>
  </section>
</main>

<script type="module">
import { db } from "./firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { bindLogoutButton, describeProfile, escapeHtml, formatCurrency, requireAuth, toNumber } from "./app.js";
import { buildDailySummary, OPERATIONAL_COLLECTIONS } from "./operational-core.js";

bindLogoutButton();
const { profile } = await requireAuth({ permission: "relatorios.operacionais" });
document.getElementById("user-info").textContent = describeProfile(profile);

const [stockSnapshot, productionSnapshot, labelSnapshot, wasteSnapshot, purchaseSnapshot] = await Promise.all([
  getDocs(collection(db, "estoque")),
  getDocs(collection(db, OPERATIONAL_COLLECTIONS.producoes)),
  getDocs(collection(db, OPERATIONAL_COLLECTIONS.etiquetas)),
  getDocs(collection(db, "desperdicios")),
  getDocs(collection(db, "comprasMensais"))
]);

const estoque = stockSnapshot.docs.map((document) => ({ id: document.id, ...document.data() }));
const producoes = productionSnapshot.docs.map((document) => ({ id: document.id, ...document.data() }));
const etiquetas = labelSnapshot.docs.map((document) => ({ id: document.id, ...document.data() }));
const desperdicios = wasteSnapshot.docs.map((document) => ({ id: document.id, ...document.data() }));
const compras = purchaseSnapshot.docs.map((document) => ({ id: document.id, ...document.data() }));
const summary = buildDailySummary({ estoque, producoes, etiquetas, desperdicios, compras });
const criticalItems = estoque.filter((item) => toNumber(item.quantidade, 0) <= toNumber(item.minimo, 0));

document.getElementById("health").textContent = `${summary.healthPercent}%`;
document.getElementById("critical").textContent = String(summary.criticalCount);
document.getElementById("stock-value").textContent = formatCurrency(summary.stockValue);
document.getElementById("labels").textContent = String(summary.labelCount);
document.getElementById("ai-summary").textContent = summary.aiSummary;

const criticalList = document.getElementById("critical-list");
criticalList.innerHTML = criticalItems.length ? "" : '<div class="empty-state">Nenhum item critico hoje.</div>';
criticalItems.forEach((item) => {
  const article = document.createElement("article");
  article.className = "card critical";
  article.innerHTML = `<h3>${escapeHtml(item.nome)}</h3><p class="muted">Atual: ${toNumber(item.quantidade, 0)} | Minimo: ${toNumber(item.minimo, 0)}</p>`;
  criticalList.appendChild(article);
});

const suggestion = document.getElementById("purchase-suggestion");
suggestion.innerHTML = criticalItems.length ? "" : '<div class="empty-state">Nenhuma compra urgente sugerida.</div>';
criticalItems.slice(0, 6).forEach((item) => {
  const ideal = Math.max(toNumber(item.maximo, 0), toNumber(item.minimo, 0) * 2);
  const buy = Math.max(0, ideal - toNumber(item.quantidade, 0));
  const article = document.createElement("article");
  article.className = "card";
  article.innerHTML = `<strong>${escapeHtml(item.nome)}</strong><p class="muted">Sugestao: comprar ${buy} ${escapeHtml(item.unidadeMedida || "un")}.</p>`;
  suggestion.appendChild(article);
});

document.getElementById("print-button").addEventListener("click", () => window.print());
</script>
</body>
</html>
