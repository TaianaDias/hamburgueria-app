<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#111827">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BurgerOps">
<link rel="icon" href="favicon-32.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<script src="premium-shell.js" defer></script>
<title>Fornecedores | Hamburgueria</title>
</head>
<body>
<main class="page">
  <header class="page-header">
    <div>
      <p class="eyebrow">Cadastros</p>
      <h1>Fornecedores</h1>
      <p id="user-info" class="muted"></p>
    </div>

    <div class="actions">
      <a class="button secondary" href="index.html">Voltar</a>
      <button id="logout-button" class="secondary" type="button">Sair</button>
    </div>
  </header>

  <section class="panel">
    <div class="page-header" style="margin-bottom: 16px;">
      <div>
        <h3 id="form-title">Novo fornecedor</h3>
        <p class="muted">Cadastre, ajuste telefone/CNPJ ou remova fornecedores que nao sao mais usados.</p>
      </div>

      <button id="cancel-edit-button" class="secondary" type="button" hidden>Cancelar edicao</button>
    </div>

    <form id="supplier-form" class="form-grid" style="margin-top: 16px;">
      <div class="field-group">
        <label for="nome">Nome</label>
        <input id="nome" placeholder="Distribuidora Central">
      </div>

      <div class="field-group">
        <label for="cnpj">CNPJ</label>
        <input id="cnpj" inputmode="numeric" placeholder="00.000.000/0000-00">
      </div>

      <div class="field-group">
        <label for="telefone">Telefone ou WhatsApp</label>
        <input id="telefone" placeholder="(11) 99999-9999">
      </div>

      <button id="save-button" type="submit">Salvar fornecedor</button>
    </form>

    <div id="status" class="status info" hidden></div>
  </section>

  <section class="panel">
    <div class="page-header" style="margin-bottom: 16px;">
      <div>
        <h3>Lista atual</h3>
        <p class="muted">Os nomes e CNPJs ajudam a casar as notas fiscais com o fornecedor certo.</p>
      </div>
    </div>

    <div id="lista" class="list"></div>
  </section>
</main>

<script type="module">
import { db } from "./firebase.js";
import {
  addDoc,
  collection,
  deleteDoc,
  doc,
  getDocs,
  serverTimestamp,
  updateDoc,
  writeBatch
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import {
  bindLogoutButton,
  describeProfile,
  escapeHtml,
  formatDocumentNumber,
  getPackageQuantity,
  getPurchaseCost,
  getUnitCost,
  getUsageUnit,
  normalizeDocumentNumber,
  normalizePhone,
  normalizeProductSuppliers,
  normalizeText,
  requireAuth,
  setStatus,
  triggerReplenishmentEvaluation
} from "./app.js";

const form = document.getElementById("supplier-form");
const formTitle = document.getElementById("form-title");
const cancelEditButton = document.getElementById("cancel-edit-button");
const saveButton = document.getElementById("save-button");
const nameInput = document.getElementById("nome");
const cnpjInput = document.getElementById("cnpj");
const phoneInput = document.getElementById("telefone");
const list = document.getElementById("lista");
const userInfo = document.getElementById("user-info");

let profile;
let fornecedores = [];
let editingSupplierId = "";

function supplierEntryMatchesSupplier(entry, supplier) {
  if (entry?.fornecedorId && supplier?.id && entry.fornecedorId === supplier.id) {
    return true;
  }

  const productCnpj = normalizeDocumentNumber(entry?.cnpj);
  const supplierCnpj = normalizeDocumentNumber(supplier?.cnpj);

  if (productCnpj && supplierCnpj && productCnpj === supplierCnpj) {
    return true;
  }

  return normalizeText(entry?.nome) === normalizeText(supplier?.nome);
}

function serializeProductSuppliers(productSuppliers) {
  return productSuppliers.map((entry) => ({
    fornecedorId: entry.fornecedorId,
    nome: entry.nome,
    cnpj: entry.cnpj,
    telefone: entry.telefone,
    telefoneNormalizado: entry.telefoneNormalizado,
    conversao: entry.conversao,
    custoCompra: entry.custoCompra,
    custoUnitario: entry.custoUnitario,
    unidadeUso: entry.unidadeUso,
    principal: entry.principal
  }));
}

function buildStockSupplierFields(productSuppliers, fallbackProduct = {}) {
  const primarySupplier = productSuppliers.find((entry) => entry.principal) || productSuppliers[0] || null;

  if (!primarySupplier) {
    const fallbackPackageQuantity = Math.max(1, Number(fallbackProduct.conversao ?? getPackageQuantity(fallbackProduct)) || 1);
    const fallbackPurchaseCost = Math.max(0, Number(fallbackProduct.custoCompra ?? getPurchaseCost(fallbackProduct)) || 0);
    const fallbackUnitCost = Math.max(0, Number(fallbackProduct.custoUnitario ?? fallbackProduct.custo ?? getUnitCost(fallbackProduct)) || 0);
    const fallbackUsageUnit = String(
      fallbackProduct.unidadeUso ?? fallbackProduct.unidadeCompra ?? getUsageUnit(fallbackProduct) ?? "un"
    ).trim() || "un";

    return {
      fornecedores: [],
      conversao: fallbackPackageQuantity,
      custoCompra: fallbackPurchaseCost,
      custoUnitario: fallbackUnitCost,
      custo: fallbackUnitCost,
      unidadeUso: fallbackUsageUnit,
      fornecedorId: "",
      fornecedorNome: "",
      fornecedor: "",
      cnpjFornecedor: ""
    };
  }

  return {
    fornecedores: serializeProductSuppliers(productSuppliers),
    conversao: primarySupplier.conversao,
    custoCompra: primarySupplier.custoCompra,
    custoUnitario: primarySupplier.custoUnitario,
    custo: primarySupplier.custoUnitario,
    unidadeUso: primarySupplier.unidadeUso,
    fornecedorId: primarySupplier.fornecedorId,
    fornecedorNome: primarySupplier.nome,
    fornecedor: primarySupplier.nome,
    cnpjFornecedor: primarySupplier.cnpj || ""
  };
}

function isProductLinkedToSupplier(product, supplier) {
  const productSuppliers = normalizeProductSuppliers(product, fornecedores);
  return productSuppliers.some((entry) => supplierEntryMatchesSupplier(entry, supplier));
}

function resetForm() {
  editingSupplierId = "";
  form.reset();
  formTitle.textContent = "Novo fornecedor";
  saveButton.textContent = "Salvar fornecedor";
  cancelEditButton.hidden = true;
}

function startEditingSupplier(fornecedor) {
  editingSupplierId = fornecedor.id;
  formTitle.textContent = "Editar fornecedor";
  saveButton.textContent = "Salvar alteracoes";
  cancelEditButton.hidden = false;
  nameInput.value = fornecedor.nome || "";
  cnpjInput.value = formatDocumentNumber(fornecedor.cnpj || "");
  phoneInput.value = fornecedor.telefone || "";
  nameInput.focus();
}

async function getLinkedProducts(supplier) {
  const snapshot = await getDocs(collection(db, "estoque"));
  return snapshot.docs
    .map((document) => ({ id: document.id, ...document.data() }))
    .filter((item) => isProductLinkedToSupplier(item, supplier));
}

async function syncLinkedProducts(supplier) {
  const linkedProducts = await getLinkedProducts(supplier);

  if (!linkedProducts.length) {
    return 0;
  }

  const batch = writeBatch(db);

  linkedProducts.forEach((item) => {
    const updatedSuppliers = normalizeProductSuppliers(item, fornecedores).map((entry) => (
      supplierEntryMatchesSupplier(entry, supplier)
        ? {
          ...entry,
          fornecedorId: supplier.id,
          nome: supplier.nome,
          cnpj: supplier.cnpj || "",
          telefone: supplier.telefone || "",
          telefoneNormalizado: normalizePhone(supplier.telefone || "")
        }
        : entry
    ));

    batch.update(doc(db, "estoque", item.id), {
      ...buildStockSupplierFields(updatedSuppliers, item),
      atualizadoEm: serverTimestamp()
    });
  });

  await batch.commit();
  return linkedProducts.length;
}

async function clearLinkedProducts(supplier) {
  const linkedProducts = await getLinkedProducts(supplier);

  if (!linkedProducts.length) {
    return 0;
  }

  const batch = writeBatch(db);

  linkedProducts.forEach((item) => {
    const remainingSuppliers = normalizeProductSuppliers(item, fornecedores)
      .filter((entry) => !supplierEntryMatchesSupplier(entry, supplier))
      .map((entry, index, entries) => ({
        ...entry,
        principal: entries.some((candidate) => candidate.principal)
          ? entry.principal
          : index === 0
      }));

    batch.update(doc(db, "estoque", item.id), {
      ...buildStockSupplierFields(remainingSuppliers, item),
      atualizadoEm: serverTimestamp()
    });
  });

  await batch.commit();
  return linkedProducts.length;
}

function renderSuppliers() {
  list.innerHTML = "";

  if (!fornecedores.length) {
    list.innerHTML = '<div class="empty-state">Nenhum fornecedor cadastrado ainda.</div>';
    return;
  }

  fornecedores.forEach((fornecedor) => {
    const card = document.createElement("details");
    card.className = "card supplier-entry";
    card.open = false;
    const cnpjInfo = fornecedor.cnpj ? ` | CNPJ ${formatDocumentNumber(fornecedor.cnpj)}` : "";
    const summary = document.createElement("summary");
    summary.className = "supplier-entry-summary summary-line";
    summary.innerHTML = `
      <div class="supplier-entry-summary-main">
        <span class="supplier-entry-name">${escapeHtml(fornecedor.nome)}</span>
        <p class="muted supplier-entry-meta">${escapeHtml(fornecedor.telefone || "Telefone nao informado")}${escapeHtml(cnpjInfo)}</p>
      </div>
      <div class="supplier-entry-summary-side">
        <strong>Fornecedor</strong>
        <span class="product-card-details-cta">Ver detalhes</span>
      </div>
    `;

    const actions = document.createElement("div");
    actions.className = "inline-actions";
    actions.style.marginTop = "16px";

    const editButton = document.createElement("button");
    editButton.type = "button";
    editButton.className = "secondary";
    editButton.textContent = "Editar";
    editButton.addEventListener("click", () => startEditingSupplier(fornecedor));

    const deleteButton = document.createElement("button");
    deleteButton.type = "button";
    deleteButton.className = "secondary";
    deleteButton.textContent = "Excluir";
    deleteButton.addEventListener("click", async () => {
      const linkedProducts = await getLinkedProducts(fornecedor);
      const message = linkedProducts.length
        ? `Deseja excluir ${fornecedor.nome}? ${linkedProducts.length} item(ns) do estoque ficarao sem fornecedor.`
        : `Deseja excluir ${fornecedor.nome}?`;

      if (!window.confirm(message)) {
        return;
      }

      try {
        deleteButton.disabled = true;
        editButton.disabled = true;

        const clearedCount = await clearLinkedProducts(fornecedor);
        await deleteDoc(doc(db, "fornecedores", fornecedor.id));

        if (editingSupplierId === fornecedor.id) {
          resetForm();
        }

        setStatus(
          "status",
          clearedCount
            ? `Fornecedor removido. ${clearedCount} item(ns) do estoque ficaram sem fornecedor e podem ser vinculados novamente depois.`
            : "Fornecedor removido com sucesso.",
          "success"
        );
        triggerReplenishmentEvaluation("fornecedor_excluido").catch(() => null);
        await loadSuppliers();
      } catch (error) {
        console.error(error);
        setStatus("status", error.message || "Nao foi possivel excluir o fornecedor.", "error");
      } finally {
        deleteButton.disabled = false;
        editButton.disabled = false;
      }
    });

    actions.appendChild(editButton);
    actions.appendChild(deleteButton);

    const body = document.createElement("div");
    body.className = "supplier-entry-body";
    body.innerHTML = `
      <div class="advanced-config-section" style="margin-bottom: 0;">
        <div class="section-heading">
          <div>
            <h4>Dados do fornecedor</h4>
            <p class="muted">Use este card para revisar contato, documento e ajustar o cadastro quando necessario.</p>
          </div>
        </div>
        <div class="analytics-month-meta">
          <div>
            <span class="muted">Nome</span>
            <strong>${escapeHtml(fornecedor.nome)}</strong>
          </div>
          <div>
            <span class="muted">Telefone</span>
            <strong>${escapeHtml(fornecedor.telefone || "Nao informado")}</strong>
          </div>
          <div>
            <span class="muted">CNPJ</span>
            <strong>${escapeHtml(formatDocumentNumber(fornecedor.cnpj) || "Nao informado")}</strong>
          </div>
        </div>
      </div>
    `;
    body.appendChild(actions);
    card.appendChild(summary);
    card.appendChild(body);
    list.appendChild(card);
  });
}

async function loadSuppliers() {
  const snapshot = await getDocs(collection(db, "fornecedores"));
  fornecedores = snapshot.docs
    .map((document) => ({ id: document.id, ...document.data() }))
    .sort((left, right) => left.nome.localeCompare(right.nome, "pt-BR"));

  renderSuppliers();
  return fornecedores;
}

cancelEditButton.addEventListener("click", () => {
  setStatus("status", "", "info");
  resetForm();
});

form.addEventListener("submit", async (event) => {
  event.preventDefault();
  setStatus("status", "", "info");

  const nome = nameInput.value.trim();
  const cnpj = normalizeDocumentNumber(cnpjInput.value);
  const telefone = phoneInput.value.trim();
  const nomeNormalizado = normalizeText(nome);

  if (!nome) {
    setStatus("status", "Informe o nome do fornecedor.", "error");
    return;
  }

  saveButton.disabled = true;

  try {
    await loadSuppliers();
    const fornecedorExistente = fornecedores.some((item) =>
      item.id !== editingSupplierId && normalizeText(item.nome) === nomeNormalizado
    );
    const cnpjExistente = cnpj
      ? fornecedores.some((item) => item.id !== editingSupplierId && normalizeDocumentNumber(item.cnpj) === cnpj)
      : false;

    if (fornecedorExistente) {
      throw new Error("Ja existe um fornecedor com esse nome.");
    }

    if (cnpjExistente) {
      throw new Error("Ja existe um fornecedor com esse CNPJ.");
    }

    if (editingSupplierId) {
      const existingSupplier = fornecedores.find((item) => item.id === editingSupplierId);

      if (!existingSupplier) {
        throw new Error("Fornecedor nao encontrado para edicao.");
      }

      const updatedSupplier = {
        id: editingSupplierId,
        nome,
        cnpj,
        telefone
      };

      await updateDoc(doc(db, "fornecedores", editingSupplierId), {
        nome,
        cnpj,
        telefone,
        telefoneNormalizado: normalizePhone(telefone),
        nomeNormalizado,
        atualizadoEm: serverTimestamp()
      });

      const syncedProducts = await syncLinkedProducts(updatedSupplier);
      resetForm();
      setStatus(
        "status",
        syncedProducts
          ? `Fornecedor atualizado com sucesso. ${syncedProducts} item(ns) do estoque tambem foram atualizados.`
          : "Fornecedor atualizado com sucesso.",
        "success"
      );
      triggerReplenishmentEvaluation("fornecedor_atualizado").catch(() => null);
    } else {
      await addDoc(collection(db, "fornecedores"), {
        nome,
        cnpj,
        telefone,
        telefoneNormalizado: normalizePhone(telefone),
        nomeNormalizado,
        criadoEm: serverTimestamp()
      });

      resetForm();
      setStatus("status", "Fornecedor salvo com sucesso.", "success");
      triggerReplenishmentEvaluation("fornecedor_criado").catch(() => null);
    }

    await loadSuppliers();
  } catch (error) {
    console.error(error);
    setStatus("status", error.message || "Nao foi possivel salvar o fornecedor.", "error");
  } finally {
    saveButton.disabled = false;
  }
});

async function init() {
  bindLogoutButton();
  const authContext = await requireAuth({ permission: "fornecedores.ver" });
  profile = authContext.profile;

  if (profile.tipo === "estoque") {
    window.location.href = "index.html";
    throw new Error("Acesso restrito.");
  }

  userInfo.textContent = describeProfile(profile);
  resetForm();
  await loadSuppliers();
}

init().catch((error) => {
  console.error(error);
  setStatus("status", "Nao foi possivel carregar a tela de fornecedores.", "error");
});
</script>
</body>
</html>
