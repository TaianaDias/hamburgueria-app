services:
  - type: web
    name: hamburgueria-app
    runtime: node
    plan: free
    region: virginia
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: COSMOS_API_TOKEN
        sync: false
      - key: COSMOS_USER_AGENT
        value: "HamburgueriaApp/1.0"
