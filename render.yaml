services:
  - type: web
    name: hamburgueria-app
    runtime: node
    plan: free
    region: virginia
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DEFAULT_EMPRESA_ID
        value: "default"
      - key: DEFAULT_LOJA_ID
        value: "matriz"
      - key: WHATSAPP_PROVIDER
        value: "log"
      - key: PUBLIC_DEMO_MODE
        value: "true"
      - key: WHATSAPP_WEBHOOK_TOKEN
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: COSMOS_API_TOKEN
        sync: false
      - key: COSMOS_USER_AGENT
        value: "HamburgueriaApp/1.0"
